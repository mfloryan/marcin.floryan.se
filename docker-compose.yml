name: mf-site

services:
  serve:
    build: .
    image: mf-site-jekyll
    volumes:
      - ./site:/site
    ports:
      - 4000:4000
      - 35729:35729
    command: >
      bundle exec jekyll serve --livereload --livereload-min-delay 5 --trace --host 0.0.0.0
    environment:
      - JEKYLL_ENV=development

  build:
    image: mf-site-jekyll
    volumes:
      - ./site:/site
      - ./marcin.floryan.se:/marcin.floryan.se
    command: >
      bundle exec jekyll build --verbose --destination /marcin.floryan.se/
    environment:
      - JEKYLL_ENV=production

  sass:
    build:
      context: .
      dockerfile: Dockerfile.sass
    image: mf-site-sass
    working_dir: /app
    volumes:
      - ./site:/app/site
    command: >
      node node_modules/sass/sass.js --watch --poll --silence-deprecation=if-function site/_sass/main.scss site/assets/css/main.css

  # Run `docker compose run --rm bundle` to update site/Gemfile.lock,
  # then `docker compose build` to rebuild the image with the new gems.
  bundle:
    build: .
    image: mf-site-jekyll
    volumes:
      - ./site:/site
    command: bundle update
